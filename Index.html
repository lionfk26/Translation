<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Translator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 1200px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        #video {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 10px;
            object-fit: cover;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        #canvas {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 10px;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .select-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            flex: 1;
        }

        .output-text {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            min-height: 150px;
            border: 1px solid #ddd;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 300px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .status {
            font-size: 0.9em;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .status.active {
            display: block;
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #1976d2;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #c62828;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #2e7d32;
        }

        .icon {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Live Camera Translator</h1>
            <p>Real-time camera text detection and translation</p>
        </div>

        <div class="content">
            <!-- Camera Section -->
            <div class="section">
                <h2>Camera Feed</h2>
                <video id="video" playsinline autoplay></video>
                <div class="controls">
                    <button class="btn-primary" onclick="startCamera()">
                        <span class="icon">▶</span>Start Camera
                    </button>
                    <button class="btn-secondary" onclick="stopCamera()">
                        <span class="icon">⏹</span>Stop Camera
                    </button>
                </div>
            </div>

            <!-- Translation Section -->
            <div class="section">
                <h2>Translation Settings</h2>
                
                <div class="select-group">
                    <select id="sourceLanguage" onchange="updateLanguages()">
                        <option value="en">English (Source)</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>

                <div class="select-group">
                    <select id="targetLanguage">
                        <option value="es">Spanish (Target)</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>

                <div class="controls">
                    <button class="btn-primary" onclick="startTranslation()">
                        <span class="icon">🔤</span>Start Text Recognition
                    </button>
                    <button class="btn-secondary" onclick="clearOutput()">
                        <span class="icon">🗑</span>Clear
                    </button>
                </div>

                <div id="status" class="status"></div>
                <h3 style="margin-top: 20px; color: #333;">Detected & Translated Text</h3>
                <div id="output" class="output-text">Translated text will appear here...</div>
            </div>
        </div>
    </div>

    <script>
        let stream = null;
        let isTranslating = false;
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Start camera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                showStatus('Camera started successfully', 'success');
            } catch (error) {
                showStatus('Error: Could not access camera. ' + error.message, 'error');
            }
        }

        // Stop camera
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                showStatus('Camera stopped', 'success');
            }
        }

        // Start text recognition and translation
        async function startTranslation() {
            if (!stream) {
                showStatus('Please start the camera first', 'error');
                return;
            }

            isTranslating = true;
            showStatus('Text recognition started...', 'active');

            // Capture frames periodically
            const interval = setInterval(async () => {
                if (!isTranslating) {
                    clearInterval(interval);
                    return;
                }

                try {
                    // Capture current frame
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0);

                    // Get image data
                    const imageData = canvas.toDataURL('image/jpeg', 0.8);

                    // Try to extract text using OCR.space API (free, no key required)
                    const detectedText = await extractTextFromImage(imageData);
                    
                    if (detectedText.trim()) {
                        const translatedText = await translateText(detectedText);
                        displayOutput(detectedText, translatedText);
                        showStatus('Text recognized and translated', 'success');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            }, 3000); // Process every 3 seconds
        }

        // Extract text from image using OCR.space API
        async function extractTextFromImage(imageData) {
            try {
                const base64 = imageData.split(',')[1];
                const response = await fetch('https://api.ocr.space/parse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        base64Image: `data:image/jpeg;base64,${base64}`,
                        apikey: 'K87899142C',
                        language: 'eng'
                    })
                });

                const data = await response.json();
                return data.IsErroredOnProcessing ? '' : (data.ParsedText || '');
            } catch (error) {
                console.error('OCR Error:', error);
                return '';
            }
        }

        // Translate text using MyMemory API (free)
        async function translateText(text) {
            if (!text.trim()) return '';

            try {
                const sourceLang = document.getElementById('sourceLanguage').value;
                const targetLang = document.getElementById('targetLanguage').value;

                const response = await fetch(
                    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`
                );

                const data = await response.json();
                return data.responseData.translatedText || text;
            } catch (error) {
                console.error('Translation Error:', error);
                return text;
            }
        }

        // Display output
        function displayOutput(detected, translated) {
            const output = document.getElementById('output');
            const now = new Date().toLocaleTimeString();
            const html = `
                <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #ddd;">
                    <div style="color: #666; font-size: 0.9em;">${now}</div>
                    <div style="color: #333; font-weight: 600; margin: 5px 0;">Original:</div>
                    <div>${detected}</div>
                    <div style="color: #667eea; font-weight: 600; margin: 8px 0; margin-top: 10px;">Translated:</div>
                    <div>${translated}</div>
                </div>
                ${output.innerHTML}
            `;
            output.innerHTML = html.substring(0, 5000); // Limit output size
        }

        // Clear output
        function clearOutput() {
            document.getElementById('output').innerHTML = 'Translated text will appear here...';
            isTranslating = false;
            showStatus('', '');
        }

        // Show status message
        function showStatus(message, type) {
            const status = document.getElementById('status');
            if (!message) {
                status.classList.remove('active', 'error', 'success');
                return;
            }
            status.textContent = message;
            status.className = `status active ${type}`;
        }

        // Update language dropdown
        function updateLanguages() {
            // Languages are already set
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            showStatus('Ready. Click "Start Camera" to begin.', 'success');
        });
    </script>
</body>
</html>
